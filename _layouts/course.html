---
layout: default
---
        <div class="post">

          <header class="post-header">
            <h1 class="post-title">{{ page.title }} </h1>
          </header>

          <article>
              <table class="table borderless mt-4">
                <tbody>
                  <tr>
                    <td><strong>Location:</strong></td>
                    <td>{{ page.location }}</td>
                  </tr>
                  <tr>
                    <td><strong>Day:</strong></td>
                    <td>{{ page.day }}</td>
                  </tr>
                </tbody>
              </table>
          </article>
        </div>
